<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reimposta Password | Aviation Eagle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0056b3; --gray: #f4f7f6; --text: #333; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--gray); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid var(--blue); }
        h1 { font-size: 22px; color: var(--blue); margin-bottom: 10px; }
        p { font-size: 14px; color: #777; margin-bottom: 30px; }
        .field { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        button:hover { background: #004494; }
        .msg { margin-top: 20px; padding: 10px; border-radius: 6px; display: none; font-size: 14px; }
        .error { background: #fdecea; color: #af233a; }
        .success { background: #edf7ed; color: #1e4620; }
    </style>
</head>
<body>

<div class="card">
    <div id="loading-state"><h1>Verifica link...</h1></div>

    <div id="form-state" style="display:none;">
        <h1>Nuova Password</h1>
        <p>Inserisci le nuove credenziali per il tuo account.</p>
        <div class="field">
            <label>Nuova Password</label>
            <input type="password" id="pass1" placeholder="Almeno 6 caratteri">
        </div>
        <div class="field">
            <label>Conferma Password</label>
            <input type="password" id="pass2" placeholder="Ripeti password">
        </div>
        <button id="btn-save">Aggiorna Password</button>
        <div id="status-msg" class="msg"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCt6Ti-xk-_7j-CI_MLILkjj6fJem9VPOY",
        authDomain: "giuseppe-4c318.firebaseapp.com",
        projectId: "giuseppe-4c318",
        storageBucket: "giuseppe-4c318.firebasestorage.app",
        messagingSenderId: "658885311131",
        appId: "1:658885311131:web:9bb26a19cec41dd331e43e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const oobCode = urlParams.get('oobCode');

    if (oobCode) {
        verifyPasswordResetCode(auth, oobCode)
            .then(() => {
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('form-state').style.display = 'block';
            })
            .catch(() => {
                document.getElementById('loading-state').innerHTML = "<h1>Errore</h1><p>Link scaduto o non valido.</p>";
            });
    }

    document.getElementById('btn-save').onclick = async () => {
        const p1 = document.getElementById('pass1').value;
        const p2 = document.getElementById('pass2').value;
        const msg = document.getElementById('status-msg');

        if (p1 !== p2 || p1.length < 6) {
            msg.innerText = "Le password non coincidono o sono troppo brevi.";
            msg.className = "msg error"; msg.style.display = "block";
            return;
        }

        try {
            await confirmPasswordReset(auth, oobCode, p1);
            msg.innerText = "Password aggiornata! Tornando al sito...";
            msg.className = "msg success"; msg.style.display = "block";
            setTimeout(() => { window.location.href = "https://aviationeagle.co.uk"; }, 3000);
        } catch (e) {
            msg.innerText = "Errore: " + e.message;
            msg.className = "msg error"; msg.style.display = "block";
        }
    };
</script>
</body>
</html>
