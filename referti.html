<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Riservata | Musumeci Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --med-red: #d90429; --dark: #2b2d42; --bg: #f4f7f6; }
        body { background: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background: var(--dark); min-height: 100vh; color: white; }
        .card-med { background: white; border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 25px; margin-bottom: 20px; }
        .btn-primary-med { background: var(--dark); border: none; color: white; padding: 10px 20px; border-radius: 8px; font-weight: 600; }
        .btn-primary-med:hover { background: var(--med-red); }
        .status-online { color: #2ecc71; font-size: 0.8rem; }
        #admin-panel { display: none; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <aside class="col-md-3 col-lg-2 sidebar p-4">
            <h4 class="fw-bold mb-5">MUSUMECI<span class="text-danger">.</span>HUB</h4>
            <nav class="nav flex-column gap-2">
                <a href="#" class="nav-link text-white opacity-75"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                <a href="#" class="nav-link text-white opacity-75"><i class="bi bi-folder me-2"></i> Documenti</a>
                <hr>
                <button class="btn btn-outline-danger btn-sm" id="logoutBtn">Log-out</button>
            </nav>
        </aside>

        <main class="col-md-9 col-lg-10 p-5">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h2 class="fw-bold mb-0">Gestione Operativa</h2>
                    <p class="text-muted" id="user-info">Caricamento utente...</p>
                </div>
                <div class="text-end">
                    <span class="badge bg-dark" id="role-tag">Accesso in corso</span>
                </div>
            </header>

            <section id="admin-panel">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card-med">
                            <h5 class="fw-bold mb-4"><i class="bi bi-person-plus text-danger me-2"></i>Registra Nuovo Paziente</h5>
                            <div class="mb-3">
                                <label class="form-label small">Nome Completo</label>
                                <input type="text" id="pNome" class="form-control" placeholder="es. Mario Rossi">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small">Email (Chiave di accesso)</label>
                                <input type="email" id="pEmail" class="form-control" placeholder="es. mario@email.it">
                            </div>
                            <button class="btn btn-primary-med w-100" id="btnSavePatient">Salva nel Database</button>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card-med">
                            <h5 class="fw-bold mb-4"><i class="bi bi-upload text-danger me-2"></i>Invia Referto</h5>
                            <div class="mb-3">
                                <label class="form-label small">Seleziona Destinatario</label>
                                <select id="selectPaziente" class="form-select">
                                    <option value="">Caricamento lista...</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small">File PDF/Immagine</label>
                                <input type="file" id="fileIn" class="form-control">
                            </div>
                            <button class="btn btn-primary-med w-100" id="btnUpload">Carica Referto</button>
                            <div class="progress mt-3" id="progBar" style="display:none; height: 10px;">
                                <div class="progress-bar bg-danger progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="mt-4">
                <div class="card-med">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0"><i class="bi bi-archive text-danger me-2"></i>Archivio Documenti</h5>
                        <div id="admin-filter" style="display:none">
                            <select id="filterSelect" class="form-select form-select-sm" onchange="loadDocuments()">
                                <option value="all">Mostra Tutti</option>
                            </select>
                        </div>
                    </div>
                    <div id="document-list" class="list-group list-group-flush">
                        </div>
                </div>
            </section>
        </main>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<script>
    // CONFIGURAZIONE
    const firebaseConfig = {
        apiKey: "AIzaSyCt6Ti-xk-_7j-CI_MLILkjj6fJem9VPOY",
        authDomain: "giuseppe-4c318.firebaseapp.com",
        projectId: "giuseppe-4c318",
        storageBucket: "giuseppe-4c318.firebasestorage.app",
        messagingSenderId: "658885311131",
        appId: "1:658885311131:web:9bb26a19cec41dd331e43e"
    };
    firebase.initializeApp(firebaseConfig);
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    const ADMINS = ['giuseppe.musumeci@gmail.com', 'aviationeagle.info@gmail.com'];

    // STATO INIZIALE
    auth.onAuthStateChanged(user => {
        if (!user) { window.location.href = "login.html"; return; }
        
        const email = user.email.toLowerCase();
        document.getElementById('user-info').innerText = email;
        const isAdmin = ADMINS.includes(email);

        if (isAdmin) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('admin-filter').style.display = 'block';
            document.getElementById('role-tag').innerText = "Amministratore";
            document.getElementById('role-tag').className = "badge bg-danger";
            syncPatients(); // Avvia caricamento pazienti
        } else {
            document.getElementById('role-tag').innerText = "Paziente";
            document.getElementById('role-tag').className = "badge bg-primary";
        }
        loadDocuments();
    });

    // --- FUNZIONE 1: SALVATAGGIO PAZIENTE ---
    document.getElementById('btnSavePatient').onclick = async function() {
        const nome = document.getElementById('pNome').value.trim();
        const email = document.getElementById('pEmail').value.toLowerCase().trim();

        if (!nome || !email) { alert("Compila entrambi i campi!"); return; }

        try {
            await db.collection('pazienti').add({
                nome: nome,
                email: email,
                creatoIl: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Paziente salvato con successo!");
            document.getElementById('pNome').value = "";
            document.getElementById('pEmail').value = "";
        } catch (error) {
            console.error("Errore salvataggio:", error);
            alert("Errore: " + error.message);
        }
    };

    // --- FUNZIONE 2: SINCRONIZZAZIONE LISTA PAZIENTI ---
    function syncPatients() {
        db.collection('pazienti').orderBy('nome').onSnapshot(snap => {
            const sel = document.getElementById('selectPaziente');
            const fil = document.getElementById('filterSelect');
            
            let options = '<option value="">-- Seleziona --</option>';
            let filters = '<option value="all">Mostra Tutti</option>';

            snap.forEach(doc => {
                const p = doc.data();
                const opt = `<option value="${p.email}">${p.nome} (${p.email})</option>`;
                options += opt;
                filters += opt;
            });

            sel.innerHTML = options;
            fil.innerHTML = filters;
        }, err => console.log("Errore sync:", err));
    }

    // --- FUNZIONE 3: UPLOAD REFERTO ---
    document.getElementById('btnUpload').onclick = async function() {
        const file = document.getElementById('fileIn').files[0];
        const email = document.getElementById('selectPaziente').value;

        if (!file || !email) { alert("Seleziona file e paziente!"); return; }

        const path = `referti/${email}/${Date.now()}_${file.name}`;
        const ref = storage.ref(path);
        const bar = document.getElementById('progBar');
        bar.style.display = 'block';

        const task = ref.put(file);
        
        task.on('state_changed', 
            s => {
                let p = (s.bytesTransferred / s.totalBytes) * 100;
                document.querySelector('.progress-bar').style.width = p + '%';
            },
            e => alert(e.message),
            async () => {
                const url = await ref.getDownloadURL();
                await db.collection('documenti').add({
                    nomeFile: file.name,
                    fileUrl: url,
                    pazienteEmail: email,
                    data: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Documento inviato!");
                bar.style.display = 'none';
                document.getElementById('fileIn').value = "";
            }
        );
    };

    // --- FUNZIONE 4: CARICAMENTO DOCUMENTI ---
    function loadDocuments() {
        const user = auth.currentUser;
        if (!user) return;

        const email = user.email.toLowerCase();
        const isAdmin = ADMINS.includes(email);
        let query = db.collection('documenti');

        if (!isAdmin) {
            // Se sei paziente, vedi solo i tuoi
            query = query.where('pazienteEmail', '==', email);
        } else {
            // Se sei admin, controlla il filtro
            const filter = document.getElementById('filterSelect').value;
            if (filter !== 'all') {
                query = query.where('pazienteEmail', '==', filter);
            }
        }

        query.orderBy('data', 'desc').onSnapshot(snap => {
            const list = document.getElementById('document-list');
            list.innerHTML = snap.empty ? '<p class="text-center p-4">Nessun documento.</p>' : '';
            
            snap.forEach(doc => {
                const d = doc.data();
                const date = d.data ? d.data.toDate().toLocaleDateString() : '...';
                list.innerHTML += `
                    <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                        <div>
                            <span class="fw-bold d-block">${d.nomeFile}</span>
                            <small class="text-muted">Inviato il ${date} ${isAdmin ? `per ${d.pazienteEmail}` : ''}</small>
                        </div>
                        <a href="${d.fileUrl}" target="_blank" class="btn btn-sm btn-outline-dark"><i class="bi bi-eye"></i> Apri</a>
                    </div>`;
            });
        }, err => console.log("Errore doc:", err));
    }

    document.getElementById('logoutBtn').onclick = () => auth.signOut();
</script>

<footer class="p-4 text-center text-muted small border-top bg-white">
    &copy; 2026 Prof. Giuseppe Musumeci 

</body>
</html>
