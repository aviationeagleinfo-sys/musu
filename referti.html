<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Aggiornamenti | Musumeci Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --eagle-red: #d90429; --eagle-dark: #2b2d42; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .news-card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; transition: 0.3s; background: white; }
        .news-card:hover { transform: translateY(-3px); }
        .admin-box { background: var(--eagle-dark); color: white; border-radius: 12px; padding: 25px; display: none; margin-bottom: 40px; }
        .btn-eagle { background: var(--eagle-red); color: white; border: none; font-weight: 600; }
        .btn-eagle:hover { background: #b30422; color: white; }
        .date-tag { font-size: 0.8rem; color: #8d99ae; font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container py-5">
    <header class="text-center mb-5">
        <h1 class="fw-bold text-dark">NEWS <span class="text-danger">&</span> AGGIORNAMENTI</h1>
        <p class="text-muted">Comunicazioni ufficiali e aggiornamenti tecnici</p>
        <div id="userStatus" class="small mt-2"></div>
    </header>

    <section id="adminArea" class="admin-box">
        <h4 class="mb-4"><i class="bi bi-pencil-square me-2"></i>Pubblica Nuovo Aggiornamento</h4>
        <div class="row g-3">
            <div class="col-md-4">
                <input type="text" id="newsTitle" class="form-control" placeholder="Titolo dell'articolo">
            </div>
            <div class="col-md-4">
                <select id="newsCategory" class="form-select">
                    <option value="Generale">Generale</option>
                    <option value="Tecnico">Tecnico</option>
                    <option value="Importante">Importante ⚠️</option>
                </select>
            </div>
            <div class="col-md-4">
                <input type="text" id="newsLink" class="form-control" placeholder="Link (opzionale - es. Google Drive)">
            </div>
            <div class="col-12">
                <textarea id="newsContent" class="form-control" rows="3" placeholder="Scrivi qui il contenuto della news..."></textarea>
            </div>
            <div class="col-12 text-end">
                <button class="btn btn-eagle px-5" id="btnPublish">Pubblica Ora</button>
            </div>
        </div>
    </section>

    <div id="newsFeed" class="row justify-content-center">
        <div class="text-center p-5">
            <div class="spinner-border text-danger" role="status"></div>
            <p class="mt-2">Caricamento notizie...</p>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // Configurazione
    const firebaseConfig = {
        apiKey: "AIzaSyCt6Ti-xk-_7j-CI_MLILkjj6fJem9VPOY",
        authDomain: "giuseppe-4c318.firebaseapp.com",
        projectId: "giuseppe-4c318",
        storageBucket: "giuseppe-4c318.firebasestorage.app",
        messagingSenderId: "658885311131",
        appId: "1:658885311131:web:9bb26a19cec41dd331e43e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const ADMINS = ['giuseppe.musumeci@gmail.com', 'aviationeagle.info@gmail.com'];

    // Controllo Accesso
    auth.onAuthStateChanged(user => {
        if (user && ADMINS.includes(user.email.toLowerCase())) {
            document.getElementById('adminArea').style.display = 'block';
            document.getElementById('userStatus').innerHTML = `<span class="badge bg-success">Modalità Editor: ${user.email}</span>`;
        }
        loadNews();
    });

    // Funzione Pubblicazione
    document.getElementById('btnPublish').onclick = async () => {
        const title = document.getElementById('newsTitle').value;
        const content = document.getElementById('newsContent').value;
        const category = document.getElementById('newsCategory').value;
        const link = document.getElementById('newsLink').value;

        if(!title || !content) return alert("Titolo e contenuto sono obbligatori!");

        try {
            await db.collection('news').add({
                titolo: title,
                testo: content,
                categoria: category,
                link: link,
                data: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("News pubblicata!");
            // Reset campi
            document.getElementById('newsTitle').value = "";
            document.getElementById('newsContent').value = "";
            document.getElementById('newsLink').value = "";
        } catch (e) {
            alert("Errore: " + e.message);
        }
    };

    // Funzione Caricamento (Real-time)
    function loadNews() {
        db.collection('news').orderBy('data', 'desc').onSnapshot(snap => {
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = snap.empty ? '<p class="text-center">Nessuna news presente.</p>' : '';

            snap.forEach(doc => {
                const n = doc.data();
                const date = n.data ? n.data.toDate().toLocaleDateString('it-IT') : 'Adesso';
                const isAdmin = auth.currentUser && ADMINS.includes(auth.currentUser.email.toLowerCase());

                feed.innerHTML += `
                    <div class="col-md-8">
                        <article class="news-card p-4">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="date-tag">${date}</span>
                                <span class="badge ${n.categoria === 'Importante' ? 'bg-danger' : 'bg-dark'}">${n.categoria}</span>
                            </div>
                            <h3 class="fw-bold mb-3">${n.titolo}</h3>
                            <p class="text-secondary">${n.testo.replace(/\n/g, '<br>')}</p>
                            <div class="d-flex justify-content-between align-items-center mt-4">
                                ${n.link ? `<a href="${n.link}" target="_blank" class="btn btn-sm btn-outline-danger">Approfondisci <i class="bi bi-arrow-right"></i></a>` : '<span></span>'}
                                ${isAdmin ? `<button onclick="deleteNews('${doc.id}')" class="btn btn-link text-muted p-0"><i class="bi bi-trash"></i></button>` : ''}
                            </div>
                        </article>
                    </div>
                `;
            });
        });
    }

    // Funzione Elimina
    window.deleteNews = async (id) => {
        if(confirm("Vuoi davvero eliminare questa news?")) {
            await db.collection('news').doc(id).delete();
        }
    };
</script>

</body>
</html>
