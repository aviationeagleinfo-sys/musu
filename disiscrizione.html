<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disiscrizione - Dr. Giuseppe Musumeci</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --med-red: #d90429;
            --deep-red: #b00202;
            --tech-black: #2b2d42;
            --clean-white: #ffffff;
            --soft-gray: #f8f9fa;
            --column-base: rgba(210, 210, 215, 0.6); 
            --column-highlight: rgba(255, 255, 255, 0.8);
            --column-shadow: rgba(0, 0, 0, 0.2);
        }

        body { 
            background-color: var(--soft-gray); 
            color: var(--tech-black); 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .greek-column {
            position: fixed; top: 0; width: 65px; height: 100vh; z-index: -1;
            background: linear-gradient(90deg, var(--column-shadow) 0%, var(--column-base) 20%, var(--column-highlight) 35%, var(--column-base) 50%, var(--column-shadow) 65%, var(--column-base) 80%, var(--column-shadow) 100%);
            background-size: 32px 100%; border-left: 2px solid rgba(0,0,0,0.1); border-right: 2px solid rgba(0,0,0,0.1);
        }
        .col-left { left: 5px; } .col-right { right: 5px; }

        .unsubscribe-card {
            background: white;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            border-top: 8px solid var(--deep-red);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 { font-family: 'Outfit', sans-serif; font-weight: 600; margin-bottom: 20px; }
        
        .btn-unsubscribe { 
            background-color: var(--tech-black); 
            color: white; 
            border-radius: 0; 
            padding: 12px 30px; 
            font-weight: 600; 
            border: none;
            transition: 0.3s;
        }
        
        .btn-unsubscribe:hover { background-color: var(--deep-red); color: white; }
        
        #status-msg { display: none; margin-top: 20px; padding: 15px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="greek-column col-left"></div>
    <div class="greek-column col-right"></div>

    <div class="unsubscribe-card">
        <div class="mb-4">
            <img src="https://www.drgiuseppemusumeci.com/favicon.png" alt="Logo" width="60">
        </div>
        
        <h2>Gestione Newsletter</h2>
        <p class="text-muted">Ci dispiace vederti andare via. Inserisci la tua email per confermare la rimozione dal nostro database clinico.</p>
        
        <div id="form-container">
            <div class="mb-3">
                <input type="email" id="unsub-email" class="form-control form-control-lg text-center" placeholder="tua@email.com" style="border-radius:0;">
            </div>
            <button onclick="processUnsubscribe()" id="btn-submit" class="btn btn-unsubscribe w-100">
                CONFERMA DISISCRIZIONE
            </button>
        </div>

        <div id="status-msg"></div>
        
        <div class="mt-4">
            <a href="https://drgiuseppemusumeci.com/index.html" class="text-decoration-none text-muted small">
                <i class="bi bi-arrow-left"></i> Torna alla home
            </a>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx8G37BwoA4ItwRFoaCrMK9HU6sN2qhkhLyLbyifCjA8ifqkfdM3XdHB_ML-8Z67y_yrA/exec";

        // Tenta di recuperare l'email dai parametri URL (es. unsubscribe.html?email=test@test.it)
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const emailParam = params.get('email');
            if (emailParam) {
                document.getElementById('unsub-email').value = emailParam;
            }
        };

        async function processUnsubscribe() {
            const email = document.getElementById('unsub-email').value;
            const btn = document.getElementById('btn-submit');
            const statusMsg = document.getElementById('status-msg');

            if (!email || !email.includes('@')) {
                alert("Inserisci un indirizzo email valido.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "ELABORAZIONE...";

            try {
                // Invio richiesta al tuo Google Script
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        email: email,
                        action: 'unsubscribe'
                    })
                });

                // Successo (no-cors non permette di leggere la risposta, ma assumiamo l'invio riuscito)
                document.getElementById('form-container').style.display = 'none';
                statusMsg.style.display = 'block';
                statusMsg.className = 'alert alert-success';
                statusMsg.innerHTML = "Richiesta ricevuta. L'email è stata rimossa con successo.";
                
                // Reindirizzamento dopo 3 secondi
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 3000);

            } catch (error) {
                btn.disabled = false;
                btn.innerText = "CONFERMA DISISCRIZIONE";
                statusMsg.style.display = 'block';
                statusMsg.className = 'alert alert-danger';
                statusMsg.innerText = "Si è verificato un errore. Riprova più tardi.";
            }
        }
    </script>
</body>
</html>
