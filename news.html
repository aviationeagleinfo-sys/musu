<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News&Aggiornamenti | Dr. Giuseppe Musumeci</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'analytics_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied'
      });
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HYME8VH6Y5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-HYME8VH6Y5');
    </script>

    <style>
        :root { --eagle-red: #d90429; --eagle-dark: #2b2d42; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; transition: padding-top 0.3s; }
        
        /* Overlay Sicurezza */
        #password-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }

        .news-card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; transition: 0.3s; background: white; border-left: 5px solid transparent; }
        .news-card:hover { transform: translateY(-3px); }
        .admin-box { background: var(--eagle-dark); color: white; border-radius: 12px; padding: 25px; display: none; margin-bottom: 40px; border-top: 4px solid var(--eagle-red); }
        .btn-eagle { background: var(--eagle-red); color: white; border: none; font-weight: 600; }
        .btn-eagle:hover { background: #b30422; color: white; }
        .date-tag { font-size: 0.8rem; color: #8d99ae; font-weight: 600; text-transform: uppercase; }
        
        .border-primary { border-left-color: #0d6efd !important; }
        .border-success { border-left-color: #198754 !important; }
        .border-danger { border-left-color: #dc3545 !important; }
        .border-warning { border-left-color: #ffc107 !important; }
        .border-info { border-left-color: #0dcaf0 !important; }
        .border-dark { border-left-color: #212529 !important; }
        .border-notice { border-left-color: #f59e42 !important; }

        /* Stili Cookie Banner (Semplificati per brevità, mantieni i tuoi originali se preferisci) */
        #cookie-settings-trigger { position: fixed; bottom: 20px; left: 20px; width: 45px; height: 45px; border-radius: 50%; background: #1a1a1a; color: #e63946; border: 2px solid #e63946; cursor: pointer; z-index: 9998; display: flex; align-items: center; justify-content: center; }
        .cookie-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; display: none; align-items: flex-end; padding: 20px; }
        .cookie-card { background: #1a1a1a; color: white; padding: 25px; border-radius: 12px; max-width: 500px; margin: 0 auto; border-top: 4px solid #e63946; }
    </style>
</head>
<body>

<div id="password-overlay">
    <div class="login-box text-center bg-dark p-4 p-md-5 rounded-4 border border-danger shadow-lg w-100" style="max-width: 400px;">
        <h4 class="mb-4 text-danger"><i class="bi bi-shield-lock"></i> Admin Verification</h4>
        
        <div id="step-pass">
            <input type="password" id="system-password" class="form-control mb-3 text-center" placeholder="Password di sistema...">
        </div>

        <div id="step-otp" style="display:none;">
            <p class="text-white-50 small mb-2">Inserisci codice Authenticator</p>
            <input type="text" id="otp-code" class="form-control mb-3 text-center fs-4" placeholder="000000" maxlength="6" style="letter-spacing: 5px;">
        </div>

        <button id="btn-unlock-action" onclick="handleSecurityFlow()" class="btn btn-danger w-100 fw-bold mb-2">PROSEGUI</button>
        <button onclick="closeSecurity()" class="btn btn-link text-white btn-sm">Sola Lettura</button>
    </div>
</div>

<div class="container py-5">
    <header class="text-center mb-5">
        <h1 class="fw-bold text-dark">NEWS <span class="text-danger">&</span> AGGIORNAMENTI</h1>
        <p class="text-muted">Comunicazioni ufficiali e aggiornamenti tecnici</p>
        <div id="userStatus" class="small mt-2"></div>
    </header>

    <section id="adminArea" class="admin-box">
        <h4 class="mb-4"><i class="bi bi-pencil-square me-2"></i>Pubblica Nuovo Aggiornamento</h4>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label small">Titolo</label>
                <input type="text" id="newsTitle" class="form-control" placeholder="Titolo dell'articolo">
            </div>
            <div class="col-md-4">
                <label class="form-label small">Etichetta</label>
                <select id="newsCategory" class="form-select">
                    <option value="Generale">Generale</option>
                    <option value="Tecnico">Tecnico</option>
                    <option value="Importante">Importante ⚠️</option>
                    <option value="Sicurezza">Sicurezza</option>
                    <option value="Manutenzione">Manutenzione</option>
                    <option value="News">News</option>
                    <option value="Evento">Evento</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label small">Colore Evidenziatore</label>
                <select id="newsColor" class="form-select">
                    <option value="dark">Grigio Scuro (Default)</option>
                    <option value="primary">Blu (Info)</option>
                    <option value="success">Verde (Ok/Risolto)</option>
                    <option value="danger">Rosso (Allarme)</option>
                    <option value="warning">Giallo (Attenzione)</option>
                    <option value="info">Azzurro (News)</option>
                    <option value="notice">Arancione (Avviso)</option>
                </select>
            </div>
            <div class="col-12">
                <label class="form-label small">Link Esterno (Opzionale)</label>
                <input type="text" id="newsLink" class="form-control" placeholder="https://...">
            </div>
            <div class="col-12">
                <label class="form-label small">Contenuto</label>
                <textarea id="newsContent" class="form-control" rows="4" placeholder="Scrivi qui il contenuto..."></textarea>
            </div>
            <div class="col-12 text-end mt-3">
                <button class="btn btn-eagle px-5 py-2" id="btnPublish">Pubblica Messaggio</button>
            </div>
        </div>
    </section>

    <div id="newsFeed" class="row justify-content-center">
        <div class="text-center p-5">
            <div class="spinner-border text-danger" role="status"></div>
            <p class="mt-2">Sincronizzazione notizie...</p>
        </div>
    </div>
</div>

<button id="cookie-settings-trigger" onclick="toggleCookieBanner()">
    <i class="bi bi-gear-fill"></i>
</button>
<div id="cookie-overlay" class="cookie-overlay">
    <div class="cookie-card">
        <h3>Consenso ai Cookie</h3>
        <p>Utilizziamo i cookie per analizzare la tua esperienza sul sito.</p>
        <div class="d-flex gap-2 mt-3">
            <button onclick="updateConsent('granted')" class="btn btn-danger flex-grow-1">Accetta Tutti</button>
            <button onclick="updateConsent('denied')" class="btn btn-secondary flex-grow-1">Solo Necessari</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCt6Ti-xk-_7j-CI_MLILkjj6fJem9VPOY",
        authDomain: "giuseppe-4c318.firebaseapp.com",
        projectId: "giuseppe-4c318",
        storageBucket: "giuseppe-4c318.firebasestorage.app",
        messagingSenderId: "658885311131",
        appId: "1:658885311131:web:9bb26a19cec41dd331e43e"
    };
    
    // Inizializzazione Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Variabili di Stato Globali
    const ADMINS = ['giuseppe.musumeci@gmail.com', 'aviationeagle.info@gmail.com', 'drgiuseppemusumeci@gmail.com'];
    const OBFUSCATED_PASS = "VHVyYXRpNjI="; // Corretta per "Turati62"
    const TOTP_SECRET = "4S67MLT7N67EXK7U";
    
    let isSecurityCleared = false;
    let loginStep = 1;

    // Monitoraggio Autenticazione e Caricamento Iniziale
    auth.onAuthStateChanged(user => {
        if (user && ADMINS.includes(user.email.toLowerCase())) {
            if(!isSecurityCleared) {
                document.getElementById('password-overlay').style.display = 'flex';
            }
            document.getElementById('userStatus').innerHTML = `<span class="badge bg-success">Admin: ${user.email}</span>`;
        }
        // Carica sempre le news, indipendentemente dal login
        loadNews();
    });

    // Gestione Sicurezza (Password + OTP)
    window.handleSecurityFlow = () => {
        if (loginStep === 1) {
            const inputPass = document.getElementById("system-password").value;
            if (btoa(inputPass) === OBFUSCATED_PASS) {
                loginStep = 2;
                document.getElementById('step-pass').style.display = 'none';
                document.getElementById('step-otp').style.display = 'block';
                document.getElementById('btn-unlock-action').innerText = "CONFERMA CODICE";
            } else { 
                alert("Password Errata."); 
            }
        } else if (loginStep === 2) {
            const code = document.getElementById("otp-code").value.trim();
            let totp = new OTPAuth.TOTP({
                secret: OTPAuth.Secret.fromBase32(TOTP_SECRET),
                digits: 6,
                period: 30
            });

            if (totp.validate({ token: code, window: 1 }) !== null) {
                isSecurityCleared = true;
                document.getElementById('password-overlay').style.display = 'none';
                document.getElementById('adminArea').style.display = 'block';
                loadNews(); // Ricarica per mostrare i tasti delete
            } else { 
                alert("Codice errato o scaduto."); 
            }
        }
    };

    window.closeSecurity = () => {
        document.getElementById('password-overlay').style.display = 'none';
    };

    // Pubblicazione News
    document.getElementById('btnPublish').onclick = async () => {
        const title = document.getElementById('newsTitle').value;
        const content = document.getElementById('newsContent').value;
        const category = document.getElementById('newsCategory').value;
        const color = document.getElementById('newsColor').value;
        const link = document.getElementById('newsLink').value;

        if(!title || !content) return alert("Titolo e Contenuto sono obbligatori!");

        try {
            await db.collection('news').add({
                titolo: title, 
                testo: content, 
                categoria: category, 
                colore: color, 
                link: link,
                data: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Pubblicato!");
            document.getElementById('newsTitle').value = "";
            document.getElementById('newsContent').value = "";
            document.getElementById('newsLink').value = "";
        } catch (e) { alert("Errore: " + e.message); }
    };

    // Caricamento News in Realtime
    function loadNews() {
        db.collection('news').orderBy('data', 'desc').onSnapshot(snap => {
            const feed = document.getElementById('newsFeed');
            if (snap.empty) {
                feed.innerHTML = '<div class="col-12 text-center p-5"><p class="text-muted">Nessun aggiornamento presente.</p></div>';
                return;
            }
            
            feed.innerHTML = '';
            snap.forEach(doc => {
                const n = doc.data();
                const date = n.data ? n.data.toDate().toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: 'numeric' }) : '...';
                const badgeColor = n.colore || 'dark';

                feed.innerHTML += `
                    <div class="col-md-8 mb-4">
                        <article class="news-card p-4 border-${badgeColor}">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="date-tag"><i class="bi bi-calendar3 me-1"></i> ${date}</span>
                                <span class="badge bg-${badgeColor}">${n.categoria}</span>
                            </div>
                            <h3 class="fw-bold mb-3">${n.titolo}</h3>
                            <p class="text-secondary" style="white-space: pre-wrap;">${n.testo}</p>
                            <div class="d-flex justify-content-between align-items-center mt-4">
                                ${n.link ? `<a href="${n.link}" target="_blank" class="btn btn-sm btn-outline-${badgeColor}">Dettagli <i class="bi bi-box-arrow-up-right"></i></a>` : '<span></span>'}
                                ${isSecurityCleared ? `<button onclick="deleteNews('${doc.id}')" class="btn btn-link text-danger p-0"><i class="bi bi-trash"></i></button>` : ''}
                            </div>
                        </article>
                    </div>`;
            });
        }, error => {
            console.error("Errore Firestore:", error);
            document.getElementById('newsFeed').innerHTML = '<p class="text-center text-danger">Errore nel caricamento dei dati.</p>';
        });
    }

    window.deleteNews = async (id) => {
        if(confirm("Eliminare definitivamente questo post?")) {
            try {
                await db.collection('news').doc(id).delete();
            } catch (e) { alert("Errore eliminazione: " + e.message); }
        }
    };

    // Cookie Logic
    window.updateConsent = (status) => {
        localStorage.setItem('ae_cookie_consent', status);
        if(typeof gtag === 'function') {
            gtag('consent', 'update', { 'analytics_storage': status, 'ad_storage': status });
        }
        document.getElementById('cookie-overlay').style.display = 'none';
    };

    window.toggleCookieBanner = () => {
        const o = document.getElementById('cookie-overlay');
        o.style.display = (o.style.display === 'flex') ? 'none' : 'flex';
    };
</script>

</body>
</html>
