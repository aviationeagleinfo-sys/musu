<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione | Musumeci Digital</title>
     <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --med-red: #d90429; --tech-black: #2b2d42; --soft-gray: #f8f9fa; }
        body { background-color: var(--soft-gray); font-family: 'Inter', sans-serif; padding: 50px 0; }
        .reg-card { background: white; border-left: 5px solid var(--med-red); padding: 40px; max-width: 600px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-control { border-radius: 0; border: 1px solid #ddd; padding: 12px; }
        .btn-register { background: var(--tech-black); color: white; border-radius: 0; font-weight: 600; border: none; transition: 0.3s; }
        .btn-register:hover { background: var(--med-red); color: white; }
        /* Griglia social aggiornata a 2 colonne */
        .social-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .social-btn-reg { border: 1px solid #ddd; background: white; padding: 10px; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.3s; text-transform: uppercase;}
        .social-btn-reg:hover { background: #f8f9fa; border-color: #bbb; }
        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: #888; font-size: 0.8rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eee; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="reg-card">
            <h2 class="fw-bold mb-1 text-uppercase">Crea Account Clinico</h2>
            <p class="text-muted small mb-4">Registrazione rapida tramite protocolli social o email.</p>

            <div class="social-grid">
                <button class="social-btn-reg" id="regGoogle"><i class="bi bi-google text-danger"></i> GOOGLE</button>
                <button class="social-btn-reg" id="regFB"><i class="bi bi-facebook text-primary"></i> FACEBOOK</button>
                </div>

            <div class="divider">OPPURE USA LA TUA EMAIL</div>

            <form id="regForm" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small fw-bold">NOME</label>
                    <input type="text" id="regNome" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold">COGNOME</label>
                    <input type="text" id="regCognome" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label small fw-bold">EMAIL PROFESSIONALE</label>
                    <input type="email" id="regEmail" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold">PASSWORD</label>
                    <input type="password" id="regPass" class="form-control" required placeholder="Min. 8 caratteri, 1 numero">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold">CONFERMA PASSWORD</label>
                    <input type="password" id="regConfirm" class="form-control" required>
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-register w-100 py-3 text-uppercase">Conferma Registrazione</button>
                </div>
            </form>

            <div class="text-center mt-4 border-top pt-3">
                <p class="small text-muted">Hai già un account? <a href="login.html" class="text-danger fw-bold text-decoration-none">ACCEDI AL TERMINALE</a></p>
                <a href="index.html" class="small text-decoration-none text-dark"><i class="bi bi-arrow-left"></i> Torna alla Home</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        // Configurazione Firebase (identica alla precedente)
        const firebaseConfig = {
            apiKey: "AIzaSyCt6Ti-xk-_7j-CI_MLILkjj6fJem9VPOY",
            authDomain: "giuseppe-4c318.firebaseapp.com",
            projectId: "giuseppe-4c318",
            storageBucket: "giuseppe-4c318.firebasestorage.app",
            messagingSenderId: "658885311131",
            appId: "1:658885311131:web:9bb26a19cec41dd331e43e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Funzione Generica Registrazione Social
        function socialReg(provider) {
            auth.signInWithPopup(provider)
                .then(() => {
                    // Firebase esegue il login automatico dopo createUser, reindirizziamo
                    window.location.href = "index.html";
                })
                .catch(err => alert("Errore di protocollo social: " + err.message));
        }

        // Eventi Bottoni Social
        document.getElementById('regGoogle').onclick = () => socialReg(new firebase.auth.GoogleAuthProvider());
        document.getElementById('regFB').onclick = () => socialReg(new firebase.auth.FacebookAuthProvider());
        // Riferimento a regMS rimosso per evitare errori JS

        // Validazione e Registrazione Email
        document.getElementById('regForm').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const confirmPass = document.getElementById('regConfirm').value;

            // Protocollo di Sicurezza Password: Minimo 8 caratteri E almeno un numero
            // Regex: ^ (inizio), (?=.*[0-9]) (almeno un numero), .{8,} (almeno 8 caratteri qualsiasi), $ (fine)
            const passwordRegex = /^(?=.*[0-9]).{8,}$/;

            if (!passwordRegex.test(pass)) {
                alert("Protocollo di sicurezza fallito: la password deve contenere almeno 8 caratteri e almeno un numero.");
                return; // Interrompe l'invio
            }

            if (pass !== confirmPass) {
                alert("Errore di sincronizzazione: le password non coincidono.");
                return;
            }

            // Procedi con la creazione se i controlli passano
            auth.createUserWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    // Registrazione completata, Firebase effettua il login automatico.
                    console.log("Account creato per:", userCredential.user.email);
                    window.location.href = "index.html"; // Salto a curvatura verso la home
                })
                .catch(err => {
                    alert("Intercettazione errore database: " + err.message);
                    console.error(err);
                });
        };
    </script>
</body>
</html>
