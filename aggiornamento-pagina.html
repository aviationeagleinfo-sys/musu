<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miglioramenti in Corso | Aviation Eagle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --eagle-red: #d90429;
            --eagle-dark: #2b2d42;
            --eagle-light: #8d99ae;
        }
        
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }

        .maintenance-icon {
            font-size: 100px;
            color: var(--eagle-dark);
            margin-bottom: 20px;
        }

        .maintenance-icon span {
            color: var(--eagle-red);
        }

        .error-message {
            font-size: 24px;
            font-weight: 700;
            color: var(--eagle-dark);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .error-description {
            color: var(--eagle-light);
            margin-bottom: 35px;
            font-size: 18px;
        }

        .btn-home {
            background-color: var(--eagle-dark);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
        }

        .btn-home:hover {
            background-color: var(--eagle-red);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(217, 4, 41, 0.3);
        }

        /* Animazione per l'ingranaggio/chiave inglese */
        .bi-wrench-adjustable {
            display: inline-block;
            animation: rotateWrench 2.5s ease-in-out infinite;
        }

        @keyframes rotateWrench {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(20deg); }
        }

        .bg-icon {
            position: absolute;
            font-size: 40vh;
            color: rgba(0,0,0,0.02);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <i class="bi bi-airplane-engines bg-icon"></i>

    <div class="error-container">
        <div class="maintenance-icon">
            <i class="bi bi-wrench-adjustable"></i><span>.</span>
        </div>
        
        <div class="error-message">
            La pagina da lei cercata sta effettuando migliorie
        </div>
        
        <p class="error-description">
            Stiamo eseguendo un check-up completo e aggiornando i nostri sistemi di bordo per garantirti un'esperienza di navigazione ad alta quota ancora più fluida.
        </p>
        
        <a href="index.html" class="btn-home">
            <i class="bi bi-house-door"></i>
            Torna alla Home
        </a>
        
        <div class="mt-5">
            <small class="text-muted">
                <i class="bi bi-clock-history me-1"></i> 
                Saremo di nuovo operativi a breve. Grazie per la pazienza.
            </small>
        </div>
    </div>

</body>
</html>
