<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Pagina Non Trovata | Aviation Eagle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --eagle-red: #d90429;
            --eagle-dark: #2b2d42;
            --eagle-light: #8d99ae;
        }
        
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 900;
            color: var(--eagle-dark);
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -5px;
        }

        .error-code span {
            color: var(--eagle-red);
        }

        .error-message {
            font-size: 24px;
            font-weight: 600;
            color: var(--eagle-dark);
            margin-bottom: 20px;
        }

        .error-description {
            color: var(--eagle-light);
            margin-bottom: 35px;
            font-size: 18px;
        }

        .btn-home {
            background-color: var(--eagle-dark);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
        }

        .btn-home:hover {
            background-color: var(--eagle-red);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(217, 4, 41, 0.3);
        }

        /* Animazione semplice per l'icona */
        .bi-exclamation-triangle {
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .bg-icon {
            position: absolute;
            font-size: 40vh;
            color: rgba(0,0,0,0.03);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <i class="bi bi-airplane-engines bg-icon"></i>

    <div class="error-container">
        <div class="error-code">4<span>0</span>4</div>
        <div class="error-message text-uppercase">Rotta non trovata</div>
        <p class="error-description">
            Spiacenti, la pagina che stai cercando è decollata verso una destinazione sconosciuta o non è mai esistita nel nostro database.
        </p>
        
        <a href="index.html" class="btn-home">
            <i class="bi bi-house-door"></i>
            Torna alla Home
        </a>
        
        <div class="mt-5">
            <small class="text-muted">
                <i class="bi bi-info-circle me-1"></i> 
                Se ritieni si tratti di un errore tecnico, contatta il supporto  <strong>Tecnico</strong>.
            </small>
        </div>
    </div>

</body>
</html>
