<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biglietto da Visita - Dr. Giuseppe Musumeci</title>
    <style>
        :root {
            --primary-blue: #1a2b3c;
            --medical-red: #d32f2f;
            --tech-gray: #f4f7f9;
            --text-dark: #333;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e0e5ec;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenitore Biglietto */
        .business-card {
            width: 550px;
            height: 320px;
            background: var(--tech-gray);
            border-radius: 15px;
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
            position: relative;
            overflow: hidden;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.8);
        }

        /* Sfondo Tech (Pattern Circuiti) */
        .business-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.05;
            background-image: radial-gradient(var(--primary-blue) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            pointer-events: none;
        }

        /* Logo Placeholder */
        .logo-container {
            width: 100px;
            height: 100px;
            margin-bottom: 10px;
            z-index: 2;
        }

        .logo-container img {
            width: 100%;
            height: auto;
        }

        /* Testi */
        .header {
            text-align: center;
            z-index: 2;
        }

        .slogan {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-blue);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 5px 0 15px 0;
        }

        .info-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            z-index: 2;
            margin-top: 10px;
        }

        .info-item {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: var(--text-dark);
        }

        .info-item strong {
            margin-right: 5px;
            color: var(--primary-blue);
            min-width: 70px;
        }

        .footer-link {
            margin-top: auto;
            font-size: 11px;
            color: var(--medical-red);
            text-decoration: none;
            font-weight: bold;
            z-index: 2;
        }

        /* Icone simulate con pallini */
        .dot {
            height: 6px;
            width: 6px;
            background-color: var(--medical-red);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <div class="business-card">
        <div class="logo-container">
            <img src="https://www.drgiuseppemusumeci.com/favicon.png" alt="Logo Dr. Musumeci">
        </div>

        <div class="header">
            <div class="slogan">Your Health, My Priority</div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <span class="dot"></span>
                <strong>MEDICO:</strong> Giuseppe Musumeci
            </div>
            <div class="info-item">
                <span class="dot"></span>
                <strong>EMAIL:</strong> drgiuseppemusumeci@gmail.com
            </div>
            <div class="info-item">
                <span class="dot"></span>
                <strong>SITO:</strong> drgiuseppemusumeci.com
            </div>
            <div class="info-item">
                <span class="dot"></span>
                <strong>OSPEDALE:</strong> Largo Filippo Turati 62, 10128, Torino (TO)
            </div>
        </div>

        <a href="https://www.drgiuseppemusumeci.com/" class="footer-link">WWW.DRGIUSEPPEMUSUMECI.COM</a>
    </div>

</body>
</html>
